services:
    server:
        build: ./server
        environment:
            CORS_ORIGINS: ${CORS_ORIGINS}
        volumes:
            - ./server/weights:/app/weights

    client:
        build:
            context: ./client
            args:
                VITE_API_URL: ${VITE_API_URL}

    proxy:
        image: nginx:alpine
        ports:
            - "80:80"
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
        depends_on:
            - server
            - client

    trainer:
        profiles: ["train"]
        build: ./server
        volumes:
            - ./server/weights:/app/weights
        command:
            [
                "python",
                "train.py",
                "--epochs",
                "20",
                "--batch-size",
                "128",
                "--lr",
                "1e-3",
            ]
